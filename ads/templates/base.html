{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassiFyi — доска объявлений</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<header class="topbar">
    <div class="container topbar-inner">
        <a href="{% url 'ad_list' %}" class="logo">📢 ClassiFyi</a>
        <nav class="nav">
            {% if user.is_authenticated %}
                <a href="{% url 'ad_create' %}" class="btn btn-primary">+ Подать объявление</a>
                <a href="{% url 'my_ads' %}">Мои объявления</a>
                <form action="{% url 'logout' %}" method="post" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="link-btn">Выйти ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Войти</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Регистрация</a>
            {% endif %}
        </nav>
    </div>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <div class="container">ClassiFyi · учебный проект на Django · {% now "Y" %}</div>
</footer>
</body>
</html>
