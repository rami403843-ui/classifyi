{% extends 'base.html' %}
{% block content %}

<div class="form-box narrow">
    <h1>Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Создать аккаунт</button>
    </form>
    <p class="muted">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a></p>
</div>

{% endblock %}
